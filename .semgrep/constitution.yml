rules:
  - id: ban-eval
    languages: [typescript, javascript]
    severity: ERROR
    message: 'constitution 위반: eval/Function 동적 코드 실행 금지'
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)

  - id: ban-dangerously-set-inner-html
    languages: [typescript, javascript]
    severity: ERROR
    message: 'constitution 위반: dangerouslySetInnerHTML 금지 — XSS 경로. 불가피하면 AMEND로 예외 승인'
    pattern: |
      dangerouslySetInnerHTML={...}

  - id: ban-child-process-from-input
    languages: [typescript, javascript]
    severity: ERROR
    message: 'constitution 위반: 문자열 결합으로 셸 명령 구성 금지'
    pattern-either:
      - pattern: $CP.exec(`...${...}...`)
      - pattern: $CP.execSync(`...${...}...`)

  - id: warn-console-log-env
    languages: [typescript, javascript]
    severity: WARNING
    message: '환경변수(시크릿 가능성) 로깅 — 출력 전 마스킹 필요'
    pattern: console.log(..., process.env.$X, ...)

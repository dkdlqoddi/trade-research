name: "[SEC] 보안"
description: "보안 취약점 신고 — 프라이빗 리포지토리라 가시성은 팀 한정. 핫픽스 레인(축소 게이트 + 24h 내 테스트·스펙 소급) + touches 우선권."
title: "[SEC] "
body:
  - type: markdown
    attributes:
      value: |
        등록은 사람만 한다. 재현은 **최소 서술**: 실자격증명·시크릿·PoC 페이로드는 이슈에도 금지(시크릿 위생).
        프라이빗 리포지토리라 이슈는 팀에게만 보이지만, "내부 = 안전"이 아니다.
  - type: textarea
    id: scope
    attributes:
      label: 영향 범위
      description: 영향받는 기능·데이터·사용자 (무엇이 노출/오염될 수 있는가)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 경로
      description: 최소 서술 — 어디를 어떻게 건드리면 드러나는가. 실자격증명·PoC 페이로드 금지
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - Critical — 자격증명/자금/PII 직접 노출
        - High — 권한 우회·데이터 변조 가능
        - Medium — 제한적 정보 노출
        - Low — 심층 방어 약화
    validations:
      required: true
  - type: textarea
    id: exposure
    attributes:
      label: 노출 기간
      description: 언제부터 존재했는가 (추정 가능하면 도입 커밋·배포 시점)
    validations:
      required: true

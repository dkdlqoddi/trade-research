name: "[BUG] 버그"
description: "기존 승인 스펙의 위반 신고 — 재현 실패 테스트가 스펙의 핵이 된다"
title: "[BUG] "
body:
  - type: markdown
    attributes:
      value: |
        등록은 사람만 한다. 재현 절차가 그대로 재현 실패 테스트가 된다 — 2단계 이상, 구체적으로.
        보안 취약점은 여기 금지 — [SEC] 폼으로(프라이빗이라 팀 한정 가시성).
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 번호 목록으로 2단계 이상
      placeholder: |
        1. `/` 접속, 프리셋을 '공격'으로 변경
        2. 첫 행의 티커 클릭
        3. 상세 페이지에서 …
    validations:
      required: true
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: 기대 vs 실제
      description: 기대 동작(가능하면 근거 스펙 R#)과 실제 동작
    validations:
      required: true
  - type: textarea
    id: env-logs
    attributes:
      label: 환경/로그
      description: 브라우저/OS, 발생 시각, 콘솔·서버 로그 발췌 (시크릿·PII 마스킹)
    validations:
      required: true

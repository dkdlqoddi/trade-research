name: gates
on:
  pull_request:
  merge_group: # EC 조직의 merge queue용 — 타 플랜에선 발화하지 않음(무해). 표준 직렬화는 auto-merge + up-to-date
  push:
    branches: [main]
concurrency:
  group: gates-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify: # done-check.sh의 우회 불가 사본
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: bash .claude/hooks/spec-lint.sh --all
      - run: npx vitest run --reporter=dot -t '^(?!.*@quarantine)' # @quarantine 제외
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pipx run semgrep scan --config p/ci --config .semgrep/ --error .
      - run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATA_SOURCE: fixture # 인수 테스트는 픽스처 모드 — 외부 시세 API를 required 게이트에 들이지 않는다(specs/001 [ASSUMED] 4)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --retries=1 --grep-invert @quarantine # 재시도 1회 포함, @quarantine 제외
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7 # 프라이빗 아티팩트 스토리지 과금 절약

  budgets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATA_SOURCE: fixture # 빌드 프리렌더·예산 측정의 결정론 확보
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci && npm run build
      - run: npx lhci autorun
      - run: npx size-limit

  mutation-diff: # 변경분만 — 전체는 nightly
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: 변경 소스만 뮤테이션
        env:
          BASE_REF: ${{ github.base_ref }} # 셸 직접 보간 금지 — env 경유 (semgrep run-shell-injection)
        run: |
          git fetch origin "$BASE_REF"
          CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- 'src/**/*.ts' 'src/**/*.tsx' \
            | grep -vE '\.(test|spec)\.' | paste -sd, -) || true
          if [ -z "$CHANGED" ]; then
            echo "변경된 구현 소스 없음 — 뮤테이션 스킵"
          else
            npx stryker run --mutate "$CHANGED"
          fi
